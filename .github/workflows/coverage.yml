name: Coverage

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    name: Update coverage badge
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Fyne deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: |
          for i in {1..5}; do
            go mod download && break || {
              if [ $i -eq 5 ]; then
                echo "Failed to download dependencies after 5 attempts"
                exit 1
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            }
          done


      - name: Run Test
        run: |
          go test -v ./... -covermode=set -coverprofile=coverage.out
          go tool cover -func=coverage.out > coverage_func.txt
          # Generate non-GUI coverage
          go test -coverprofile=coverage-nogui.out $(go list ./... | grep -v gui)


      - name: Go Coverage Badge
        uses: tj-actions/coverage-badge-go@v3
        with:
          filename: coverage.out
          text: "Coverage"
          pattern: '!\[Coverage\]\(https://img\.shields\.io/badge/Coverage-([0-9.]+)%25-([a-z]+)\)'

      - name: Go Coverage Badge (No GUI)
        uses: tj-actions/coverage-badge-go@v3
        with:
          filename: coverage-nogui.out
          text: "Coverage (no GUI)"
          pattern: '!\[Coverage \(no GUI\)\]\(https://img\.shields\.io/badge/Coverage_\(no_GUI\)-([0-9.]+)%25-([a-z]+)\)'


      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v17
        id: verify-changed-files
        with:
          files: README.md
          safe_output: 'true'


      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.files_changed }}
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: Updated coverage badges."


      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@v1.3.0
        with:
          github_token: ${{ github.token }}
          branch: ${{ github.head_ref }}
