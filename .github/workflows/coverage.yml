name: Coverage

on:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    runs-on: ubuntu-latest
    name: Update coverage badge
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
      
      - name: Setup go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'go.mod'

      - name: Install Fyne deps
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      - name: Download dependencies
        run: |
          for i in {1..5}; do
            go mod download && break || {
              if [ $i -eq 5 ]; then
                echo "Failed to download dependencies after 5 attempts"
                exit 1
              fi
              echo "Attempt $i failed, retrying in 5 seconds..."
              sleep 5
            }
          done


      - name: Run Test
        run: |
          go test -v ./... -covermode=set -coverprofile=coverage.out
          
          # Generate non-GUI coverage (excluding GUI and interactive CLI packages)
          # Scope: cleaner, diskanalyzer, internal, scanner
          CORE_PACKAGES=$(go list ./... | grep -vE "gui|interactive|cmd|^github.com/PopolQue/dupclean$")
          go test -coverprofile=coverage-nogui.out $CORE_PACKAGES

      - name: Update README Badges
        run: |
          # Calculate Total Coverage
          TOTAL=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          COLOR="red"
          if [ $(awk "BEGIN {print ($TOTAL >= 80 ? 1 : 0)}") -eq 1 ]; then COLOR="green"; elif [ $(awk "BEGIN {print ($TOTAL >= 50 ? 1 : 0)}") -eq 1 ]; then COLOR="yellow"; fi
          
          # Calculate Core Coverage
          CORE=$(go tool cover -func=coverage-nogui.out | grep total | awk '{print $3}' | sed 's/%//')
          COLOR_CORE="red"
          if [ $(awk "BEGIN {print ($CORE >= 80 ? 1 : 0)}") -eq 1 ]; then COLOR_CORE="green"; elif [ $(awk "BEGIN {print ($CORE >= 50 ? 1 : 0)}") -eq 1 ]; then COLOR_CORE="yellow"; fi

          # Inject into README.md
          sed -i "s|!\[Coverage\](https://img.shields.io/badge/Coverage-[0-9.]*%25-[a-z]*)|![Coverage](https://img.shields.io/badge/Coverage-$TOTAL%25-$COLOR)|" README.md
          sed -i "s|!\[Coverage (no GUI)\](https://img.shields.io/badge/Coverage_(no_GUI)-[0-9.]*%25-[a-z]*)|![Coverage (no GUI)](https://img.shields.io/badge/Coverage_(no_GUI)-$CORE%25-$COLOR_CORE)|" README.md
        continue-on-error: true

      - name: Verify Changed files
        uses: tj-actions/verify-changed-files@v17
        id: verify-changed-files
        with:
          files: README.md
          safe_output: 'true'

      - name: Commit changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        env:
          CHANGED_FILES: ${{ steps.verify-changed-files.outputs.files_changed }}
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git commit -m "chore: Updated coverage badges."



      - name: Push changes
        if: steps.verify-changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@v1.3.0
        with:
          github_token: ${{ github.token }}
          branch: ${{ github.head_ref }}
