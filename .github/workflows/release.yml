name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install macOS deps
        run: brew install pkg-config
      - name: Install Fyne tool
        run: go install fyne.io/fyne/v2/cmd/fyne@latest
      - name: Build macOS arm64
        run: GOARCH=arm64 go build -o dist/dupclean-darwin-arm64 .
      - name: Build macOS amd64
        run: GOARCH=amd64 go build -o dist/dupclean-darwin-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: mac-binaries
          path: dist/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Fyne deps
        run: sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o dist/dupclean-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Windows
        run: go build -o dist/dupclean-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/

  release:
    needs: [build-mac, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            mac-binaries/*
            linux-binary/*
            windows-binary/*