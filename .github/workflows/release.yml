name: Build & Release

on:
  push:
    tags:
      - 'v*'
      - '[0-9]*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: dupclean-linux-amd64
            cgo: 1
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: dupclean-linux-arm64
            cgo: 0
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: dupclean-darwin-arm64
            cgo: 1
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            artifact: dupclean-darwin-amd64
            cgo: 1
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: dupclean-windows-amd64.exe
            cgo: 1

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install dependencies (Linux)
      if: matrix.goos == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libxxf86vm-dev

    - name: Install dependencies (macOS)
      if: matrix.goos == 'darwin'
      run: |
        brew install pkg-config
        for i in {1..5}; do
          go install fyne.io/tools/cmd/fyne@latest && break || {
            if [ $i -eq 5 ]; then
              echo "Failed to install fyne tools after 5 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          }
        done

    - name: Build (non-macOS)
      if: matrix.goos != 'darwin'
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: ${{ matrix.cgo }}
      run: |
        BUILD_TAGS=""
        if [ "${{ matrix.cgo }}" = "1" ]; then
          BUILD_TAGS="-tags gui"
        fi
        go build $BUILD_TAGS -o ${{ matrix.artifact }} -ldflags="-s -w" .

    - name: Build and Package (macOS)
      if: matrix.goos == 'darwin'
      env:
        CGO_ENABLED: 1
      run: |
        # Use fyne package to create a proper .app bundle with GUI tags
        fyne package --target darwin --tags gui --name DupClean --app-id com.dupclean.app --icon dupclean_abstract_icon.png
        
        # Apply ad-hoc signature (required for Apple Silicon)
        codesign --force --deep --sign - DupClean.app
        
        # Prepare PKG structure
        mkdir -p pkg_root/Applications
        mv DupClean.app pkg_root/Applications/
        
        # Create post-install script to remove quarantine
        mkdir scripts
        cat <<EOF > scripts/postinstall
        #!/bin/bash
        # Remove quarantine attribute from the installed app
        xattr -rd com.apple.quarantine "/Applications/DupClean.app" 2>/dev/null || true
        exit 0
        EOF
        chmod +x scripts/postinstall
        
        # Build PKG
        pkgbuild --root pkg_root \
                 --identifier com.dupclean.app \
                 --version "${{ github.ref_name }}" \
                 --install-location / \
                 --scripts scripts \
                 ${{ matrix.artifact }}.pkg
        
        # Create ZIP of the .app bundle for Cask
        zip -r ${{ matrix.artifact }}.app.zip pkg_root/Applications/DupClean.app

        # Also keep the raw binary as an artifact
        cp pkg_root/Applications/DupClean.app/Contents/MacOS/dupclean ${{ matrix.artifact }}

    - name: Create tarball (Linux & macOS)
      if: matrix.goos == 'linux' || matrix.goos == 'darwin'
      run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

    - name: Create zip (Windows)
      if: matrix.goos == 'windows'
      shell: pwsh
      run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

    - name: Upload release asset
      uses: softprops/action-gh-release@v3
      with:
        files: |
          *.tar.gz
          *.zip
          *.pkg
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:'- %s (%h)' HEAD)
        else
          CHANGELOG=$(git log --pretty=format:'- %s (%h)' $PREVIOUS_TAG..HEAD)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Update Release Body
      uses: softprops/action-gh-release@v3
      with:
        name: DupClean ${{ github.ref_name }}
        body: |
          ## Changes
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Installation
          
          ### macOS (Recommended: Homebrew)
          To avoid security warnings and get both GUI and CLI:
          ```bash
          brew install --cask PopolQue/dupclean/dupclean
          ```
          *(Note: This requires you to have the PopolQue tap added or run `brew install --cask --formula https://raw.githubusercontent.com/PopolQue/dupclean/main/Casks/dupclean.rb`)*

          For CLI-only (built from source):
          ```bash
          brew install PopolQue/dupclean/dupclean
          ```
          
          ### macOS (Installer)
          1. Download `dupclean-darwin-arm64.pkg` (Apple Silicon) or `dupclean-darwin-amd64.pkg` (Intel).
          2. Double-click the file. If it shows a security warning:
             - Go to **System Settings > Privacy & Security**.
             - Scroll down to **Security**.
             - Click **Open Anyway** (Dennoch öffnen) for DupClean.
          3. Follow the wizard. Once installed, the app in your Applications folder will work without further warnings.
          
          ### Linux
          Download the appropriate tarball, extract it, and run the `dupclean` binary.
          Ensure you have OpenGL dependencies installed.
          
          ### Windows
          Download the zip file, extract it, and run `dupclean-windows-amd64.exe`.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
