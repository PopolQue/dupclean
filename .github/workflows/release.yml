permissions: 
    contents: write

name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-mac-arm64:
    runs-on: macos-latest  # GitHub's macos-latest is arm64 (M1)
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version: '1.22'
        - name: Install Fyne tool
          run: go install fyne.io/tools/cmd/fyne@latest
        - name: Install macOS deps
          run: brew install pkg-config
        - name: Build and package macOS arm64
          run: |
            mkdir -p dist
            fyne package -os darwin -arch arm64 -name DupClean -appID com.dupclean.app -icon Icon.png
            mv DupClean.app dist/

        - name: Create DMG
          run: |
            hdiutil create -volname "DupClean" \
              -srcfolder dist/DupClean.app \
              -v -foramte UDZO \
              dist/dupclean-darwin-arm64.dmg

        - uses: actions/upload-artifact@v4
          with:
            name: mac-arm64
            path: dist/dupclean-darwin-arm64.dmg

  build-mac-amd64:
    runs-on: macos-15-intel  # macos-13 is the last Intel runner on GitHub Actions
    steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-go@v5
          with:
            go-version: '1.22'
        - name: Install Fyne tool
          run: go install fyne.io/tools/cmd/fyne@latest    
        - name: Install macOS deps
          run: brew install pkg-config
        - name: Build and package macOS amd64
          run: |
            mkdir -p dist
            fyne package -os darwin -arch amd64 -name -DupClean -appID com.dupclean.app -icon Icon.png
            mv DupClean.app dist/

        - name: Create DMG
          run: |
            hdiutil create -volname "DupClean" \
              -srcfodler dist/DupClean.app \
              -ov -format UDZO \
              dist/dupclean-intel-amd64.dmg

        - uses: actions/upload-artifact@v4
          with:
            name: mac-amd64
            path: dist/dupclean-intel-amd64.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Install Fyne deps
        run: sudo apt-get install -y libgl1-mesa-dev xorg-dev
      - name: Build Linux
        run: GOOS=linux GOARCH=amd64 go build -o dist/dupclean-linux-amd64 .
      - uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          path: dist/

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build Windows
        run: go build -o dist/dupclean-windows-amd64.exe .
      - uses: actions/upload-artifact@v4
        with:
          name: windows-binary
          path: dist/

  release:
    needs: [build-mac-arm64, build-mac-amd64, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
        contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
            path: artifacts/
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/mac-arm64/*
            artifacts/mac-amd64/*
            artifacts/linux-binary/*
            artifacts/windows-binary/*