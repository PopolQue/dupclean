name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: dupclean-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: dupclean-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: dupclean-darwin-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: dupclean-darwin-amd64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: dupclean-windows-amd64.exe

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Install dependencies (Linux)
      if: matrix.goos == 'linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Install dependencies (macOS)
      if: matrix.goos == 'darwin'
      run: |
        brew install glfw

    - name: Build
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: 1
      run: |
        go build -o ${{ matrix.artifact }} -ldflags="-s -w" .

    - name: Create tarball (Unix)
      if: matrix.goos != 'windows'
      run: tar -czf ${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}

    - name: Create zip (Windows)
      if: matrix.goos == 'windows'
      run: Compress-Archive -Path ${{ matrix.artifact }} -DestinationPath ${{ matrix.artifact }}.zip

    - name: Upload release asset
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ${{ matrix.artifact }}.tar.gz
          ${{ matrix.artifact }}.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: release
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate changelog
      id: changelog
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
        if [ -z "$PREVIOUS_TAG" ]; then
          CHANGELOG=$(git log --pretty=format:'- %s (%h)' HEAD)
        else
          CHANGELOG=$(git log --pretty=format:'- %s (%h)' $PREVIOUS_TAG..HEAD)
        fi
        echo "changelog<<EOF" >> $GITHUB_OUTPUT
        echo "$CHANGELOG" >> $GITHUB_OUTPUT
        echo "EOF" >> $GITHUB_OUTPUT

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: DupClean ${{ github.ref_name }}
        body: |
          ## Changes
          
          ${{ steps.changelog.outputs.changelog }}
          
          ## Installation
          
          ### Homebrew (macOS)
          ```bash
          brew install dupclean
          ```
          
          ### Manual Installation
          Download the appropriate binary for your system from the assets below.
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
