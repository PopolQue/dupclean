name: CI

permissions:
  contents: read

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25']

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: ${{ matrix.go }}

    - name: Install govulncheck
      run: go install golang.org/x/vuln/cmd/govulncheck@latest

    - name: Run govulncheck
      run: govulncheck ./...

    - name: Install dependencies (Linux)
      if: matrix.os == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Install dependencies (macOS)
      if: matrix.os == 'macos-latest'
      run: |
        brew install glfw

    - name: Download dependencies
      run: |
        for i in {1..5}; do
          go mod download && break || {
            if [ $i -eq 5 ]; then
              echo "Failed to download dependencies after 5 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          }
        done

    - name: Build
      run: go build -v ./...

    - name: Test (Linux/macOS)
      if: matrix.os != 'windows-latest'
      run: go test -v -race ./...

    - name: Test (Windows - exclude GUI packages)
      if: matrix.os == 'windows-latest'
      run: go test -v -race ./cleaner/... ./scanner/... ./ui/... ./diskanalyzer/... ./internal/...

    - name: Vet
      run: go vet ./...

    - name: Format check
      run: |
        go fmt ./...
        git diff --exit-code

  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Download dependencies
      run: |
        for i in {1..5}; do
          go mod download && break || {
            if [ $i -eq 5 ]; then
              echo "Failed to download dependencies after 5 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          }
        done

    - name: Run golangci-lint
      uses: golangci/golangci-lint-action@v9
      with:
        version: latest
        args: --timeout=5m

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Go
      uses: actions/setup-go@v6
      with:
        go-version: '1.25'

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev xorg-dev

    - name: Download dependencies
      run: |
        for i in {1..5}; do
          go mod download && break || {
            if [ $i -eq 5 ]; then
              echo "Failed to download dependencies after 5 attempts"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 5 seconds..."
            sleep 5
          }
        done

    - name: Generate coverage
      run: go test -race -coverprofile=coverage.txt -covermode=atomic ./...

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v6
      with:
        file: ./coverage.txt
        flags: unittests
        fail_ci_if_error: false
