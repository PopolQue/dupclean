version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - gocritic
    - bodyclose
  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck
          - gosec

formatters:
  enable:
    - gofmt
    - goimports
